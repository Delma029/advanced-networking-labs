frr version 10.6.1
frr defaults traditional
!
hostname ubuntu-VirtualBox
!
!
!
!
key chain OSPF-SHA
 key 1
  cryptographic-algorithm hmac-sha-256
  key-string LabSecret2026
 exit
exit
