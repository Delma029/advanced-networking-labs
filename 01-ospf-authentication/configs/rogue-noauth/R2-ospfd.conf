exit
!
!
interface veth-r2-r3
 ip ospf network point-to-point
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 LabSecret2026
exit
!
!
interface veth-r2-r4
 ip ospf network point-to-point
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 LabSecret2026
exit
